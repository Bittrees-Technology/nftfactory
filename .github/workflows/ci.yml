name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  web-checks:
    name: Web typecheck & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck:web

      - name: Run web tests
        run: npm --workspace apps/web run test

  indexer-checks:
    name: Indexer typecheck & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck:indexer

      - name: Run indexer tests
        run: npm --workspace services/indexer run test

  forge-tests:
    name: Solidity build & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build contracts
        working-directory: packages/contracts
        run: forge build

      - name: Run Forge tests
        working-directory: packages/contracts
        run: forge test -vv
